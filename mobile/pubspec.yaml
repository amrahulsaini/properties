name: samarth_properties
description: Samarth Properties – Real Estate Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  lucide_icons: ^0.257.0
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  intl: ^0.19.0
  file_picker: ^8.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  open_file: ^3.3.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/samarth-logo.webp"
  adaptive_icon_background: "#FFF7ED"
  adaptive_icon_foreground: "assets/samarth-logo.webp"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/samarth-logo.webp
